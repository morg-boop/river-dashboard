name: Daily River Report Update

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the pipeline
        env:
          USGS_API_KEY: ${{ secrets.USGS_API_KEY }}
        run: python scripts/update_dashboard.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/usgs_daily.csv data/dashboard_data.json static/dashboard.png
          git diff --staged --quiet || git commit -m "Daily river report update"
          git push
